name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

env:
  # Force Node 24 for actions ahead of the spring-2026 Node 20 EOL.
  # Silences the "Node.js 20 is deprecated" warning for actions still
  # shipping a Node 20 runtime (e.g. actions/upload-artifact@v5).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  windows:
    name: Windows ${{ matrix.arch }} (${{ matrix.compiler }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64,   compiler: msvc,  pyarch: x64,   tool: pyinstaller }
          - { arch: x64,   compiler: mingw, pyarch: x64,   tool: pyinstaller }
          - { arch: x86,   compiler: msvc,  pyarch: x86,   tool: pyinstaller }
          - { arch: x86,   compiler: mingw, pyarch: x86,   tool: pyinstaller }
          - { arch: arm64, compiler: msvc,  pyarch: arm64, tool: pyinstaller }
          - { arch: arm64, compiler: mingw, pyarch: arm64, tool: pyinstaller }
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.pyarch }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.pyarch }}

      - name: Install MSYS2 (MinGW)
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.arch == 'x86' && 'mingw32' || (matrix.arch == 'arm64' && 'clangarm64' || 'mingw64') }}
          update: true
          install: >-
            ${{ matrix.arch == 'arm64' && 'mingw-w64-clang-aarch64-toolchain' || 'mingw-w64-i686-gcc mingw-w64-x86_64-gcc' }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6-Essentials pynput ${{ matrix.tool }}

      - name: Build CatKey
        shell: pwsh
        run: |
          ./build.ps1 -Tool ${{ matrix.tool }} -Arch ${{ matrix.arch }} -Compiler ${{ matrix.compiler }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: CatKey-Windows-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          path: dist/CatKey-${{ matrix.arch }}-${{ matrix.compiler }}
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }} (${{ matrix.compiler }})
    # TODO: switch to ubuntu-26.04 once that runner image is published by GitHub.
    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.allow_fail || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, compiler: gcc,   tool: pyinstaller }
          - { arch: x64, compiler: clang, tool: pyinstaller }
          # x86 needs a 32-bit (i386) userland, which the default x86_64 runner
          # lacks; these are best-effort and may need an i386-capable runner.
          - { arch: x86, compiler: gcc,   tool: pyinstaller, allow_fail: true }
          - { arch: x86, compiler: clang, tool: pyinstaller, allow_fail: true }
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install toolchain and Qt libs
        run: |
          sudo apt-get update
          PKGS="build-essential libgl1 libegl1 libglib2.0-0 libxkbcommon0 libdbus-1-3
                libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1
                libxcb-image0 libxcb-shm0 libxcb-randr0 libxcb-render-util0
                libxcb-xkb1 libxcb1 libfontconfig1 libfreetype6"
          if [ "${{ matrix.compiler }}" = "clang" ]; then PKGS="$PKGS clang lld"; fi
          if [ "${{ matrix.arch }}" = "x86" ]; then
            PKGS="$PKGS gcc-multilib g++-multilib libc6-dev-i386 libgl1:i386 libegl1:i386"
            # 32-bit Python for PyInstaller (best-effort; needs i386 support)
            sudo dpkg --add-architecture i386 || true
            sudo apt-get update || true
          fi
          sudo apt-get install -y $PKGS
          python -m pip install --upgrade pip
          pip install PySide6-Essentials pynput ${{ matrix.tool }}

      - name: Build CatKey
        run: |
          chmod +x build.sh
          CC=${{ matrix.compiler }} ./build.sh --tool ${{ matrix.tool }} --arch ${{ matrix.arch }} --compiler ${{ matrix.compiler }}

      - name: Upload artifact
        if: ${{ !matrix.allow_fail }}
        uses: actions/upload-artifact@v5
        with:
          name: CatKey-Linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          path: dist/CatKey-${{ matrix.arch }}-${{ matrix.compiler }}
          if-no-files-found: error

  release:
    name: Release assets
    needs: [windows, linux]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
