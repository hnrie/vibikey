name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
jobs:
  windows:
    name: Windows ${{ matrix.arch }} (${{ matrix.compiler }} / ${{ matrix.tool }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, compiler: msvc,  tool: pyinstaller }
          - { arch: x64, compiler: msvc,  tool: nuitka }
          - { arch: x64, compiler: mingw, tool: pyinstaller }
          - { arch: x64, compiler: mingw, tool: nuitka }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install MSYS2 (MinGW)
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6-Essentials pynput
          if ("${{ matrix.tool }}" -eq "nuitka") {
            python -m pip install "Nuitka[app]" ordered-set zstandard
          } else {
            python -m pip install pyinstaller
          }
      - name: Build VibiKey (onefile)
        shell: pwsh
        run: |
          ./build.ps1 -Tool ${{ matrix.tool }} -Arch ${{ matrix.arch }} -Compiler ${{ matrix.compiler }}
      - name: Verify single-file artifact
        shell: pwsh
        run: |
          $exe = "dist/VibiKey-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}.exe"
          if (-not (Test-Path $exe)) { throw "Missing onefile output: $exe" }
          $item = Get-Item $exe
          if ($item.Length -lt 1MB) { throw "Exe too small ($($item.Length) bytes): $exe" }
          Write-Host "OK: $($item.FullName) ($([math]::Round($item.Length/1MB,1)) MB)"
          Get-ChildItem dist -Recurse | Select-Object FullName, Length
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: VibiKey-Windows-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          path: dist/VibiKey-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}.exe
          if-no-files-found: error
          compression-level: 0
  linux:
    name: Linux ${{ matrix.arch }} (${{ matrix.compiler }} / ${{ matrix.tool }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, compiler: gcc,   tool: pyinstaller }
          - { arch: x64, compiler: gcc,   tool: nuitka }
          - { arch: x64, compiler: clang, tool: pyinstaller }
          - { arch: x64, compiler: clang, tool: nuitka }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install toolchain and Qt libs
        run: |
          sudo apt-get update
          PKGS="build-essential ccache patchelf libgl1 libegl1 libglib2.0-0 libxkbcommon0 libdbus-1-3
                libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1
                libxcb-image0 libxcb-shm0 libxcb-randr0 libxcb-render-util0
                libxcb-xkb1 libxcb1 libfontconfig1 libfreetype6"
          if [ "${{ matrix.compiler }}" = "clang" ]; then PKGS="$PKGS clang lld"; fi
          sudo apt-get install -y $PKGS
          python -m pip install --upgrade pip
          python -m pip install PySide6-Essentials pynput
          if [ "${{ matrix.tool }}" = "nuitka" ]; then
            python -m pip install "Nuitka[app]" ordered-set zstandard
          else
            python -m pip install pyinstaller
          fi
      - name: Build VibiKey (onefile)
        run: |
          chmod +x build.sh
          CC=${{ matrix.compiler }} ./build.sh --tool ${{ matrix.tool }} --arch ${{ matrix.arch }} --compiler ${{ matrix.compiler }} --onefile
      - name: Verify single-file artifact
        run: |
          bin="dist/VibiKey-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}"
          test -f "$bin"
          test -x "$bin"
          size=$(stat -c%s "$bin")
          if [ "$size" -lt 1000000 ]; then echo "Binary too small: $size"; exit 1; fi
          echo "OK: $bin ($(du -h "$bin" | cut -f1))"
          ls -lah dist/
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: VibiKey-Linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          path: dist/VibiKey-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          if-no-files-found: error
          compression-level: 0
  release-notes:
    name: Generate release notes (AI)
    needs: [windows, linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve context range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            CURRENT="${{ github.event.release.tag_name }}"
          else
            CURRENT="run-${{ github.run_id }}"
          fi
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.sha }}^" 2>/dev/null || echo "")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Gather full context (commits, diffstat, merged PRs)
        env:
          GH_TOKEN: ${{ github.token }}
          PREV_TAG: ${{ steps.range.outputs.prev_tag }}
        run: |
          mkdir -p release-notes
          RANGE="${PREV_TAG:+$PREV_TAG..}HEAD"

          {
            echo "## Commit log ($RANGE)"
            git log "$RANGE" --pretty='- %h %s (%an)' --no-merges
            echo
            echo "## Diffstat"
            git diff "$RANGE" --stat
            echo
            echo "## Merged pull requests since $PREV_TAG"
            gh pr list --repo "${{ github.repository }}" --state merged \
              --search "merged:>=$(git log -1 --format=%aI "${PREV_TAG:-$(git rev-list --max-parents=0 HEAD)}")" \
              --json number,title,body,author \
              --jq '.[] | "### #\(.number) \(.title) (@\(.author.login))\n\(.body // "")\n"' || true
          } > release-notes/CONTEXT.md

      - name: Draft release notes with MiMo-V2.5 (OpenCode Zen)
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.error, urllib.request

          context = open("release-notes/CONTEXT.md", encoding="utf-8").read()
          context = context[:150_000]

          prompt = f"""You are drafting release notes for VibiKey, a desktop app.
          Use the FULL context below (commit log, diffstat, merged PR titles/descriptions)
          to write polished, user-facing release notes in Markdown.

          Structure:
          - One-paragraph summary of the release
          - "### Features" (only if applicable)
          - "### Fixes" (only if applicable)
          - "### Other changes" (only if applicable)
          - Omit empty sections. Do not invent changes not present in the context.
          - Keep it concise and skimmable, no marketing fluff.

          CONTEXT:
          {context}
          """

          body = json.dumps({
              "model": "mimo-v2.5-free",
              "max_tokens": 1500,
              "messages": [{"role": "user", "content": prompt}],
          }).encode()

          def fallback_notes(source):
              commits = []
              in_commit_log = False
              for line in source.splitlines():
                  if line.startswith("## Commit log"):
                      in_commit_log = True
                      continue
                  if line.startswith("## ") and in_commit_log:
                      break
                  if in_commit_log and line.startswith("- "):
                      item = re.sub(r"^- [0-9a-f]+ ", "", line)
                      item = re.sub(r" \\([^)]+\\)$", "", item)
                      commits.append(item)
              if not commits:
                  return "No user-facing changes were detected."
              return ("This release includes the changes listed below.\n\n"
                      "### Other changes\n" + "\n".join(commits))

          text = ""
          api_key = os.environ.get("OPENCODE_API_KEY", "").strip()
          if api_key:
              headers = {
                  "content-type": "application/json",
                  "authorization": f"Bearer {api_key}",
                  "user-agent": "VibiKey-GitHub-Actions/1.0",
              }
              req = urllib.request.Request(
                  "https://opencode.ai/zen/v1/chat/completions",
                  data=body,
                  headers=headers,
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      data = json.load(resp)
                  text = (data.get("choices", [{}])[0]
                              .get("message", {})
                              .get("content", "")).strip()
              except (urllib.error.URLError, TimeoutError, ValueError, KeyError) as exc:
                  print(f"AI release-note generation unavailable ({exc}); using fallback.")
          else:
              print("OPENCODE_API_KEY is not configured; using deterministic fallback.")

          with open("release-notes/BODY.md", "w", encoding="utf-8") as f:
              f.write((text or fallback_notes(context)).strip() + "\n")
          PYEOF

      - name: Upload release notes
        uses: actions/upload-artifact@v5
        with:
          name: release-notes
          path: release-notes/BODY.md

  release:
    name: Release assets
    if: github.event_name != 'pull_request'
    needs: [windows, linux, release-notes]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Collect single-file release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          count=0
          for dir in artifacts/VibiKey-*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            files=("$dir"/*)
            if [ ${#files[@]} -eq 0 ]; then
              echo "empty artifact dir: $dir" >&2
              exit 1
            fi
            for f in "${files[@]}"; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              if [[ "$name" == Windows-* ]]; then
                if [[ "$base" != *.exe ]]; then
                  out="${name}.exe"
                else
                  out="$base"
                fi
              else
                out="$name"
              fi
              cp -f "$f" "release-assets/$out"
              chmod +x "release-assets/$out" || true
              echo "asset: release-assets/$out ($(du -h "release-assets/$out" | cut -f1))"
              count=$((count + 1))
            done
          done
          ls -lah release-assets/
          test "$count" -gt 0
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || format('run-{0}', github.run_id) }}
          body_path: artifacts/release-notes/BODY.md
          files: release-assets/*
