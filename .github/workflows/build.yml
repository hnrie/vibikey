name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  windows:
    name: Windows ${{ matrix.arch }} (${{ matrix.compiler }} / ${{ matrix.tool }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, compiler: msvc,  tool: pyinstaller }
          - { arch: x64, compiler: msvc,  tool: nuitka }
          - { arch: x64, compiler: mingw, tool: pyinstaller }
          - { arch: x64, compiler: mingw, tool: nuitka }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install MSYS2 (MinGW)
        if: matrix.compiler == 'mingw'
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: mingw-w64-x86_64-gcc
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6-Essentials pynput ${{ matrix.tool }}
      - name: Build VibiKey
        shell: pwsh
        run: |
          ./build.ps1 -Tool ${{ matrix.tool }} -Arch ${{ matrix.arch }} -Compiler ${{ matrix.compiler }}
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: VibiKey-Windows-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          path: dist/VibiKey-${{ matrix.arch }}-${{ matrix.compiler }}
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.arch }} (${{ matrix.compiler }} / ${{ matrix.tool }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x64, compiler: gcc,   tool: pyinstaller }
          - { arch: x64, compiler: gcc,   tool: nuitka }
          - { arch: x64, compiler: clang, tool: pyinstaller }
          - { arch: x64, compiler: clang, tool: nuitka }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install toolchain and Qt libs
        run: |
          sudo apt-get update
          PKGS="build-essential libgl1 libegl1 libglib2.0-0 libxkbcommon0 libdbus-1-3
                libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1
                libxcb-image0 libxcb-shm0 libxcb-randr0 libxcb-render-util0
                libxcb-xkb1 libxcb1 libfontconfig1 libfreetype6"
          if [ "${{ matrix.compiler }}" = "clang" ]; then PKGS="$PKGS clang lld"; fi
          sudo apt-get install -y $PKGS
          python -m pip install --upgrade pip
          pip install PySide6-Essentials pynput ${{ matrix.tool }}
      - name: Build VibiKey
        run: |
          chmod +x build.sh
          CC=${{ matrix.compiler }} ./build.sh --tool ${{ matrix.tool }} --arch ${{ matrix.arch }} --compiler ${{ matrix.compiler }}
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: VibiKey-Linux-${{ matrix.arch }}-${{ matrix.compiler }}-${{ matrix.tool }}
          path: dist/VibiKey-${{ matrix.arch }}-${{ matrix.compiler }}
          if-no-files-found: error

  release:
    name: Release assets
    needs: [windows, linux]
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
